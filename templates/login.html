{% extends "base.html" %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p class="auth-subtitle">Voice Email Assistant</p>
    
    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if oauth_error %}
      <div class="alert alert-error">{{ oauth_error }}</div>
    {% endif %}

    <!-- Email/Password Login Form -->
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>
      </div>

      <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <!-- Divider -->
    <div class="auth-divider">
      <span>or</span>
    </div>

    <!-- OAuth Option -->
    <a href="/auth/login-oauth" class="btn btn-secondary btn-google">
      <span>✦</span> Login with Google
    </a>

    <!-- Sign Up Link -->
    <p class="auth-footer">
      Don't have an account? <a href="/auth/signup">Sign up here</a>
    </p>
  </div>
</div>
{% endblock %}
