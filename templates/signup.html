{% extends "base.html" %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>Create Account</h1>
    
    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6">
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required minlength="6">
      </div>

      <button type="submit" class="btn btn-primary">Sign Up</button>
    </form>

    <div class="auth-divider">
      <span>or</span>
    </div>

    <a href="/auth/login-oauth" class="btn btn-secondary btn-google">
      <span>✦</span> Sign up with Google
    </a>

    <p class="auth-footer">
      Already have an account? <a href="/auth/login">Login here</a>
    </p>
  </div>
</div>
{% endblock %}
