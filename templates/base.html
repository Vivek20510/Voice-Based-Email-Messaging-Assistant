<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Email Assistant</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    {% block head %}{% endblock %}
  </head>
  <body>
    {% if not auth_layout %}
      <header class="site-header">
        <div class="container">
          <a class="brand" href="/">🎤 Voice Assistant</a>
          <nav>
            <a href="/">Home</a>
            {% if session.user_email %}
              <a href="/compose">✉️ Compose</a>
              <a href="/settings">⚙️ Settings</a>
              <a href="/auth/logout" style="color: var(--danger);">Logout</a>
            {% else %}
              <a href="/auth/login">Login</a>
            {% endif %}
          </nav>
        </div>
      </header>
    {% endif %}
    <main{% if auth_layout %} style="padding: 0; min-height: 100vh;"{% endif %}>
      {% block content %}{% endblock %}
    </main>
    {% if not auth_layout %}
      <footer class="site-footer">
        <div class="container">Built for voice email and messaging.</div>
      </footer>
    {% endif %}
    <script src="/static/js/api.js"></script>
    <script src="/static/js/audio.js"></script>
    <script src="/static/js/app.js"></script>
  </body>
</html>
