name: Python CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FLASK_APP: src.app
      FLASK_ENV: development
      SECRET_KEY: ci-secret-key
      DATABASE_URL: sqlite:///./data.db
      GMAIL_API_ENABLED: "false"
      GOOGLE_OAUTH_CREDENTIALS_PATH: .secrets/google_oauth.json
      GOOGLE_OAUTH_REDIRECT_URI: http://localhost:5000/auth/google/callback
      TELEGRAM_BOT_TOKEN: test-telegram-token
      NLP_MODEL: google/flan-t5-small

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Prepare local secrets path
        run: |
          mkdir -p .secrets
          cat <<'EOF' > .secrets/google_oauth.json
          {
            "web": {
              "client_id": "dummy-client-id.apps.googleusercontent.com",
              "project_id": "ci-project",
              "auth_uri": "https://accounts.google.com/o/oauth2/auth",
              "token_uri": "https://oauth2.googleapis.com/token",
              "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
              "client_secret": "dummy-client-secret",
              "redirect_uris": [
                "http://localhost:5000/auth/google/callback"
              ],
              "javascript_origins": [
                "http://localhost:5000"
              ]
            }
          }
          EOF

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: python -m ruff check .

      - name: Check formatting with Black
        run: python -m black --check .

      - name: Run tests
        run: pytest --maxfail=1 --disable-warnings -q
